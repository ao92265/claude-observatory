name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install uv
        run: pip install uv
      - name: Install packages
        run: |
          pip install -e packages/core
          pip install -e packages/hookscope
          pip install -e packages/ccpilot
          pip install -e packages/web
          pip install pytest hypothesis pytest-asyncio
      - name: Generate fixtures
        run: python3 tests/fixtures/generate.py
      - name: Test
        run: pytest -q

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check packages
