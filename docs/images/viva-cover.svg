<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="50%" stop-color="#0d1525"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#58a6ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="domeGlow" cx="0.5" cy="1" r="0.6">
      <stop offset="0%" stop-color="#ffa657" stop-opacity="0.45"/>
      <stop offset="80%" stop-color="#ffa657" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Subtle starfield -->
  <g fill="#c9d1d9">
    <circle cx="120" cy="80" r="1.2" opacity="0.6"/>
    <circle cx="250" cy="160" r="0.9" opacity="0.4"/>
    <circle cx="430" cy="60" r="1.5" opacity="0.7"/>
    <circle cx="610" cy="130" r="0.8" opacity="0.35"/>
    <circle cx="820" cy="50" r="1.1" opacity="0.5"/>
    <circle cx="990" cy="180" r="0.9" opacity="0.4"/>
    <circle cx="1180" cy="90" r="1.4" opacity="0.65"/>
    <circle cx="1340" cy="200" r="0.8" opacity="0.35"/>
    <circle cx="1470" cy="70" r="1.2" opacity="0.55"/>
    <circle cx="160" cy="320" r="0.9" opacity="0.4"/>
    <circle cx="300" cy="460" r="1.3" opacity="0.6"/>
    <circle cx="580" cy="380" r="0.7" opacity="0.3"/>
    <circle cx="900" cy="450" r="1.0" opacity="0.45"/>
    <circle cx="1080" cy="540" r="0.8" opacity="0.4"/>
    <circle cx="1290" cy="430" r="1.2" opacity="0.55"/>
    <circle cx="1500" cy="540" r="0.9" opacity="0.4"/>
    <circle cx="80" cy="700" r="1.1" opacity="0.5"/>
    <circle cx="350" cy="780" r="0.9" opacity="0.4"/>
    <circle cx="730" cy="820" r="1.3" opacity="0.6"/>
    <circle cx="1000" cy="720" r="0.8" opacity="0.35"/>
    <circle cx="1320" cy="800" r="1.0" opacity="0.45"/>
    <circle cx="1490" cy="730" r="0.9" opacity="0.4"/>
  </g>

  <!-- Constellation lines (faint) -->
  <g stroke="#30363d" stroke-width="0.6" opacity="0.5">
    <line x1="120" y1="80" x2="250" y2="160"/>
    <line x1="250" y1="160" x2="430" y2="60"/>
    <line x1="1180" y1="90" x2="1340" y2="200"/>
    <line x1="1340" y1="200" x2="1500" y2="540"/>
  </g>

  <!-- Glow behind observatory -->
  <circle cx="1240" cy="500" r="380" fill="url(#glow)"/>

  <!-- Observatory dome (right side) -->
  <g transform="translate(1240,560)">
    <!-- base -->
    <rect x="-180" y="0" width="360" height="60" rx="6" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <!-- pillars -->
    <rect x="-160" y="-10" width="20" height="80" fill="#1f2733"/>
    <rect x="140" y="-10" width="20" height="80" fill="#1f2733"/>
    <!-- dome -->
    <path d="M -160 0 A 160 160 0 0 1 160 0 Z" fill="#1f2733" stroke="#58a6ff" stroke-width="2"/>
    <!-- dome slit -->
    <path d="M -22 -158 L 22 -158 L 18 0 L -18 0 Z" fill="#0a0e1a" stroke="#58a6ff" stroke-width="1.5"/>
    <!-- telescope coming out -->
    <g transform="rotate(-25)">
      <rect x="-8" y="-260" width="16" height="180" fill="#161b22" stroke="#ffa657" stroke-width="2"/>
      <circle cx="0" cy="-270" r="14" fill="#0a0e1a" stroke="#ffa657" stroke-width="2"/>
      <circle cx="0" cy="-270" r="6" fill="#ffa657" opacity="0.8"/>
    </g>
    <ellipse cx="0" cy="0" rx="180" ry="14" fill="url(#domeGlow)" opacity="0.6"/>
  </g>

  <!-- Holographic terminal windows (left side) -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="14">
    <!-- Window 1: cost ledger -->
    <g transform="translate(120,250)">
      <rect width="340" height="160" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" opacity="0.95"/>
      <rect width="340" height="28" rx="10" fill="#21262d"/>
      <circle cx="14" cy="14" r="5" fill="#f85149"/>
      <circle cx="32" cy="14" r="5" fill="#d29922"/>
      <circle cx="50" cy="14" r="5" fill="#3fb950"/>
      <text x="76" y="18" fill="#8b949e" font-size="12">observatory cost</text>
      <text x="16" y="58" fill="#79c0ff">$ observatory cost --days 7</text>
      <text x="16" y="82" fill="#c9d1d9">263 sessions  $8,197.05 spent</text>
      <text x="16" y="104" fill="#ffa657">10 opus-on-trivial flagged</text>
      <text x="16" y="126" fill="#7ee787">$443.10/mo savings available</text>
      <text x="16" y="148" fill="#8b949e">────────────────────────────</text>
    </g>

    <!-- Window 2: healthcheck suggest -->
    <g transform="translate(180,460)">
      <rect width="380" height="180" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" opacity="0.95"/>
      <rect width="380" height="28" rx="10" fill="#21262d"/>
      <circle cx="14" cy="14" r="5" fill="#f85149"/>
      <circle cx="32" cy="14" r="5" fill="#d29922"/>
      <circle cx="50" cy="14" r="5" fill="#3fb950"/>
      <text x="76" y="18" fill="#8b949e" font-size="12">healthcheck suggest</text>
      <text x="16" y="58" fill="#79c0ff">[model-downgrade]  conf 60%</text>
      <text x="16" y="80" fill="#c9d1d9">claude-opus-4-7 → claude-sonnet-4-6</text>
      <text x="16" y="102" fill="#7ee787">est $46.73/mo</text>
      <text x="16" y="128" fill="#79c0ff">[claude-md-rule]   conf 55%</text>
      <text x="16" y="150" fill="#c9d1d9">3 hedge phrases detected</text>
      <text x="16" y="170" fill="#ffa657">→ MUST/WILL/NEVER</text>
    </g>

    <!-- Window 3: tiny bar chart -->
    <g transform="translate(70,690)">
      <rect width="280" height="140" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5" opacity="0.95"/>
      <rect width="280" height="28" rx="10" fill="#21262d"/>
      <circle cx="14" cy="14" r="5" fill="#f85149"/>
      <circle cx="32" cy="14" r="5" fill="#d29922"/>
      <circle cx="50" cy="14" r="5" fill="#3fb950"/>
      <text x="76" y="18" fill="#8b949e" font-size="12">cache hit rate · 30d</text>
      <!-- bars -->
      <g transform="translate(24,50)">
        <rect x="0" y="60" width="24" height="60" fill="#58a6ff" rx="2"/>
        <rect x="34" y="40" width="24" height="80" fill="#58a6ff" rx="2"/>
        <rect x="68" y="20" width="24" height="100" fill="#58a6ff" rx="2"/>
        <rect x="102" y="10" width="24" height="110" fill="#7ee787" rx="2"/>
        <rect x="136" y="14" width="24" height="106" fill="#7ee787" rx="2"/>
        <rect x="170" y="6" width="24" height="114" fill="#7ee787" rx="2"/>
        <rect x="204" y="4" width="24" height="116" fill="#7ee787" rx="2"/>
      </g>
      <text x="148" y="100" fill="#7ee787" text-anchor="end" font-size="11">94.2%</text>
    </g>
  </g>

  <!-- Title block -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" text-anchor="middle">
    <text x="800" y="120" fill="#58a6ff" font-size="18" letter-spacing="6">— LOCAL-FIRST OBSERVABILITY FOR CLAUDE CODE —</text>
    <text x="800" y="240" fill="#f0f6fc" font-size="92" font-weight="800" letter-spacing="-2">CLAUDE OBSERVATORY</text>
    <text x="800" y="290" fill="#8b949e" font-size="22">See what your AI coding agent is doing. Cut what you don't need.</text>
  </g>

  <!-- Bottom labels -->
  <g font-family="ui-monospace, Menlo, monospace" font-size="16">
    <g transform="translate(720,860)">
      <rect x="-180" y="-26" width="160" height="36" rx="18" fill="#161b22" stroke="#7ee787" stroke-width="1.5"/>
      <text x="-100" y="-3" fill="#7ee787" text-anchor="middle" font-weight="700">🩺 HealthDoctor</text>
      <rect x="20" y="-26" width="160" height="36" rx="18" fill="#161b22" stroke="#ffa657" stroke-width="1.5"/>
      <text x="100" y="-3" fill="#ffa657" text-anchor="middle" font-weight="700">❤  HealthCheck</text>
    </g>
  </g>

  <!-- github handle bottom right -->
  <text x="1560" y="870" fill="#8b949e" font-family="ui-monospace, Menlo, monospace" font-size="14" text-anchor="end" opacity="0.7">github.com/ao92265/claude-observatory · v0.1.0</text>
</svg>
