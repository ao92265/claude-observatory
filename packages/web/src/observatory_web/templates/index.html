<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Claude Observatory</title>
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js"></script>
<style>
  body { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; margin: 0; background: #0e1116; color: #c9d1d9; }
  header { padding: 12px 16px; border-bottom: 1px solid #30363d; display: flex; gap: 12px; align-items: center; }
  header h1 { font-size: 16px; margin: 0; color: #58a6ff; }
  .filters input, .filters select { background: #161b22; color: #c9d1d9; border: 1px solid #30363d; padding: 4px 8px; border-radius: 4px; font-family: inherit; }
  main { display: grid; grid-template-columns: 1fr 480px; gap: 0; height: calc(100vh - 50px); }
  #timeline { overflow-y: auto; padding: 0 12px; }
  #detail { border-left: 1px solid #30363d; overflow-y: auto; padding: 12px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 4px 8px; border-bottom: 1px solid #21262d; font-size: 12px; }
  tr:hover { background: #161b22; cursor: pointer; }
  .kind-hook { color: #7ee787; }
  .kind-tool_use { color: #ffa657; }
  .kind-usage { color: #79c0ff; }
  .exit-nonzero { color: #f85149; }
  pre { white-space: pre-wrap; word-break: break-all; font-size: 12px; }
</style>
</head>
<body>
<header>
  <h1>claude-observatory</h1>
  <div class="filters">
    <select name="kind" hx-get="/events" hx-target="#timeline-body" hx-trigger="change" hx-include="[name='q']">
      <option value="">all kinds</option>
      <option value="hook">hook</option>
      <option value="tool_use">tool_use</option>
      <option value="usage">usage</option>
    </select>
    <input name="q" placeholder="search…" hx-get="/events" hx-target="#timeline-body" hx-trigger="keyup changed delay:300ms" hx-include="[name='kind']">
  </div>
  <span style="margin-left:auto;font-size:12px;opacity:0.6">live · auto-refresh 2s</span>
</header>
<main>
  <section id="timeline" hx-get="/events" hx-trigger="load, every 2s" hx-target="#timeline-body">
    <table>
      <thead><tr><th>id</th><th>ts</th><th>kind</th><th>hook/tool</th><th>dur</th><th>exit</th></tr></thead>
      <tbody id="timeline-body"></tbody>
    </table>
  </section>
  <section id="detail">
    <p style="opacity:0.5">Click a row to inspect.</p>
  </section>
</main>
</body>
</html>
